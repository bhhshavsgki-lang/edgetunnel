name: High-Speed-VLESS-Power

on:
  workflow_dispatch:

jobs:
  run-vless:
    runs-on: ubuntu-latest
    steps:
      - name: System Power Optimization
        run: |
          # Optimize Linux Kernel for High-Speed Networking
          sudo sysctl -w net.core.rmem_max=16777216
          sudo sysctl -w net.core.wmem_max=16777216
          sudo sysctl -w net.ipv4.tcp_rmem='4096 87380 16777216'
          sudo sysctl -w net.ipv4.tcp_wmem='4096 65536 16777216'
          sudo sysctl -w net.ipv4.tcp_congestion_control=bbr
          sudo sysctl -w net.core.netdev_max_backlog=5000
          sudo sysctl -w net.ipv4.tcp_fastopen=3

      - name: Install Xray and Cloudflared
        run: |
          # Install latest Xray-core
          wget https://github.com/XTLS/Xray-core/releases/latest/download/Xray-linux-64.zip
          sudo apt-get install unzip -y
          unzip Xray-linux-64.zip
          chmod +x xray

          # Create Optimized VLESS Config with Early Data (ed=2048)
          cat <<EOF > config.json
          {
            "log": { "loglevel": "none" },
            "inbounds": [{
              "port": 8080,
              "protocol": "vless",
              "settings": {
                "clients": [{"id": "ec082f65-51b6-45a4-bb97-83f217c28820"}],
                "decryption": "none"
              },
              "streamSettings": {
                "network": "ws",
                "wsSettings": {
                  "path": "/vless?ed=2048"
                }
              }
            }],
            "outbounds": [{
              "protocol": "freedom",
              "settings": { "domainStrategy": "UseIP" }
            }]
          }
          EOF

          # Start Xray in background
          ./xray -c config.json &

      - name: Start High-Speed Tunnel
        run: |
          wget https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared-linux-amd64.deb
          
          echo "--- YOUR POWER VLESS URL WILL APPEAR BELOW ---"
          # Using --protocol http2 for better tunnel throughput
          cloudflared tunnel --protocol http2 --url http://localhost:8080
