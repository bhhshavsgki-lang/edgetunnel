name: VLESS Temporary Server

on:
  workflow_dispatch: # Allows you to start it manually

jobs:
  run-vless:
    runs-on: ubuntu-latest
    steps:
      - name: Install Xray and Cloudflared
        run: |
          # Download Xray-core
          wget https://github.com/XTLS/Xray-core/releases/latest/download/Xray-linux-64.zip
          sudo apt-get install unzip -y
          unzip Xray-linux-64.zip
          chmod +x xray

          # Create a basic VLESS configuration
          cat <<EOF > config.json
          {
            "inbounds": [{
              "port": 8080,
              "protocol": "vless",
              "settings": {
                "clients": [{"id": "ec082f65-51b6-45a4-bb97-83f217c28820"}],
                "decryption": "none"
              },
              "streamSettings": {
                "network": "ws",
                "wsSettings": {"path": "/vless"}
              }
            }],
            "outbounds": [{"protocol": "freedom"}]
          }
          EOF

          # Start Xray in the background
          ./xray -c config.json &

      - name: Start Cloudflare Tunnel (Argo)
        run: |
          # Download cloudflared to create a public link
          wget https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared-linux-amd64.deb
          
          # This creates a random public URL for your VLESS server
          echo "--- YOUR VLESS URL WILL APPEAR BELOW ---"
          cloudflared tunnel --url http://localhost:8080
